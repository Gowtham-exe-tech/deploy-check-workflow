services:
  - type: web
    name: halleyx-workflow-engine-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./workflow_engine.db
      - key: PYTHON_VERSION
        value: 3.11.0
